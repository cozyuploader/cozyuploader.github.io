<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>비밀번호 재설정 · Cozy Uploader</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "맑은 고딕", sans-serif;
    background: #12151b; color: #e8e8e8; padding: 20px;
  }
  .card {
    width: 100%; max-width: 400px; background: #1b1f27; border: 1px solid #2a3441;
    border-radius: 16px; padding: 32px 28px; text-align: center;
  }
  .logo { font-size: 22px; font-weight: 800; color: #7cc5a0; margin-bottom: 4px; }
  h1 { font-size: 18px; margin: 8px 0 6px; }
  .desc { font-size: 13px; color: #9aa4b2; margin-bottom: 20px; line-height: 1.5; }
  input {
    width: 100%; padding: 13px 14px; margin: 6px 0; border-radius: 10px;
    border: 1px solid #2f3a48; background: #232833; color: #fff; font-size: 15px;
  }
  input:focus { outline: none; border-color: #7cc5a0; }
  button {
    width: 100%; padding: 13px; margin-top: 12px; border: none; border-radius: 10px;
    background: #139640; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  button:disabled { background: #3a4653; cursor: default; }
  .status { font-size: 13px; margin-top: 14px; min-height: 18px; line-height: 1.5; }
  .ok { color: #7cc5a0; }
  .err { color: #ff8a8a; }
  #form { display: none; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">Cozy Uploader</div>
    <h1>비밀번호 재설정</h1>
    <p class="desc" id="intro">링크를 확인하는 중입니다…</p>

    <div id="form">
      <input type="password" id="pw1" placeholder="새 비밀번호 (6자 이상)" autocomplete="new-password">
      <input type="password" id="pw2" placeholder="새 비밀번호 다시 입력" autocomplete="new-password">
      <button id="btn">비밀번호 변경</button>
    </div>
    <p class="status" id="status"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var SUPABASE_URL = "https://iviovhxhiizkajlqgsis.supabase.co";
    var SUPABASE_KEY = "sb_publishable_F8t_FbtedQnF83qa7BdaVg_yRcSiHCr";
    var client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { detectSessionInUrl: true, flowType: "implicit", persistSession: false }
    });

    var intro = document.getElementById("intro");
    var form = document.getElementById("form");
    var statusEl = document.getElementById("status");
    var btn = document.getElementById("btn");
    var ready = false;

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = "status " + (cls || "");
    }
    function showForm() {
      if (ready) return;
      ready = true;
      intro.textContent = "새로 사용할 비밀번호를 입력해 주세요.";
      form.style.display = "block";
    }
    function showBadLink() {
      if (ready) return;
      intro.textContent = "";
      setStatus("링크가 만료되었거나 올바르지 않습니다. 앱에서 '비밀번호 재설정 링크 보내기'를 다시 눌러 새 링크를 받아주세요.", "err");
    }

    // 1) 복구 세션이 잡히면 폼 표시
    client.auth.onAuthStateChange(function (event, session) {
      if (event === "PASSWORD_RECOVERY" || (session && (event === "SIGNED_IN" || event === "INITIAL_SESSION"))) {
        showForm();
      }
    });

    // 2) 안전망 — 로드 후 세션 직접 확인
    window.addEventListener("load", function () {
      setTimeout(function () {
        client.auth.getSession().then(function (res) {
          if (res && res.data && res.data.session) showForm();
          else showBadLink();
        }).catch(showBadLink);
      }, 1500);
    });

    // 3) 비밀번호 변경
    btn.addEventListener("click", function () {
      var p1 = document.getElementById("pw1").value;
      var p2 = document.getElementById("pw2").value;
      if (p1.length < 6) { setStatus("비밀번호는 6자 이상이어야 합니다.", "err"); return; }
      if (p1 !== p2) { setStatus("두 비밀번호가 서로 다릅니다.", "err"); return; }
      btn.disabled = true; btn.textContent = "변경 중…"; setStatus("");
      client.auth.updateUser({ password: p1 }).then(function (res) {
        if (res.error) {
          setStatus("오류: " + res.error.message, "err");
          btn.disabled = false; btn.textContent = "비밀번호 변경";
        } else {
          form.style.display = "none";
          intro.textContent = "";
          setStatus("✅ 비밀번호가 변경되었습니다! 이제 Cozy Uploader 앱에서 새 비밀번호로 로그인하세요.", "ok");
        }
      });
    });
  </script>
</body>
</html>
